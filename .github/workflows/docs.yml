# Build the Astro Starlight documentation site and deploy it to GitHub Pages.
# The site lives in docs/ and is managed with pnpm.
name: Deploy docs

# Trigger on pushes that touch the docs or this workflow, plus manual runs.
on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Minimum permissions required to publish to GitHub Pages with OpenID Connect.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow a single Pages deployment at a time; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

# Every run step executes from the docs/ directory, where the site lives.
defaults:
  run:
    working-directory: docs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Astro requires Node.js >= 22.12. pnpm is provided through Corepack, which
      # ships with Node and runs the version pinned by the "packageManager" field
      # in docs/package.json, so the build always uses this Node runtime.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the documentation site
        run: pnpm build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
